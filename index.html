<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tienda de Barrio - Punto de Venta</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <link rel="stylesheet" href="style-empleado.css">
    </head>
<body>
<div class="app-container">
    <button class="menu-toggle-btn" id="menuToggleBtn">☰</button>

    <div class="floating-menu" id="floatingMenu">
        <div class="menu-item" data-section="ventas"><span class="menu-icon">💰</span><span class="menu-text">Ventas</span></div>
        <div class="menu-item" data-section="inventario"><span class="menu-icon">📦</span><span class="menu-text">Inventario</span></div>
        <div class="menu-item" data-section="historial"><span class="menu-icon">📊</span><span class="menu-text">Historial</span></div>
        <div class="menu-item" data-section="reportes"><span class="menu-icon">📈</span><span class="menu-text">Reportes</span></div>
    </div>

    <div id="ventas" class="section active-section">
        <div class="top-bar">
            <div class="search-container">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchProduct" placeholder="Buscar producto por nombre..." autocomplete="off">
                </div>
            </div>
        </div>
        <div class="work-area">
            <div class="products-grid">
                <div class="section-title">📦 Productos disponibles</div>
                <div id="productList" class="product-cards">Cargando...</div>
            </div>
            <div class="cart-panel">
                <div class="section-title">🛒 Venta actual</div>
                <div id="cartItems" class="cart-items">No hay productos agregados</div>
                <div class="cart-total"><strong>Total: $<span id="total">0</span></strong></div>
                <div class="payment-options">
                    <button class="payment-btn" data-payment="efectivo">💵 Efectivo</button>
                    <button class="payment-btn" data-payment="transferencia">🏦 Transferencia</button>
                    <button class="payment-btn" data-payment="online">💳 Pago en Línea</button>
                </div>
                <button id="completeSaleBtn" class="complete-sale">✅ Completar Venta</button>
            </div>
        </div>
    </div>

    <div id="inventario" class="section">
        <h2>📦 Gestión de Inventario</h2>
        <div class="inventory-form">
            <input type="text" id="newProductName" placeholder="Nombre del producto">
            <input type="number" id="newProductPrice" placeholder="Precio">
            <input type="number" id="newProductStock" placeholder="Stock">
            <button id="addProductBtn">➕ Agregar Producto</button>
        </div>
        <div id="inventoryList"></div>
    </div>

    <div id="historial" class="section">
        <h2>📊 Historial de Ventas</h2>
        <div id="historyList">Cargando...</div>
    </div>

    <div id="reportes" class="section">
        <h2>📈 Reportes Avanzados</h2>
        <div>Próximamente: reportes diarios, semanales y top productos</div>
    </div>
</div>

<script>
    let productos = [];
    let carrito = [];
    let selectedPayment = "efectivo";
    let ventasHistorial = [];

    function saveData() {
        localStorage.setItem('productos', JSON.stringify(productos));
        localStorage.setItem('ventas', JSON.stringify(ventasHistorial));
    }

    function loadData() {
        const stored = localStorage.getItem('productos');
        if(stored) {
            productos = JSON.parse(stored);
        } else {
            productos = [
                {id: 1, nombre: "Arroz", precio: 120, stock: 10},
                {id: 2, nombre: "Frijoles", precio: 80, stock: 15},
                {id: 3, nombre: "Pan", precio: 25, stock: 30},
                {id: 4, nombre: "Leche", precio: 150, stock: 8},
                {id: 5, nombre: "Café", precio: 200, stock: 5}
            ];
            saveData();
        }
        
        const storedVentas = localStorage.getItem('ventas');
        if(storedVentas) ventasHistorial = JSON.parse(storedVentas);
    }

    function renderProducts(filter = "") {
        const container = document.getElementById("productList");
        if(!container) return;
        
        let filtered = productos.filter(p => p.nombre.toLowerCase().includes(filter.toLowerCase()));
        if(filtered.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#9ca3af;">No hay productos disponibles</div>';
            return;
        }
        
        container.innerHTML = filtered.map(p => `
            <div class="product-card" onclick="addToCart(${p.id})">
                <div class="product-name">${p.nombre}</div>
                <div class="product-price">$${p.precio.toFixed(2)}</div>
                <div class="product-stock">Stock: ${p.stock}</div>
            </div>
        `).join('');
    }

    function addToCart(productId) {
        const product = productos.find(p => p.id === productId);
        if(!product) return;
        if(product.stock <= 0) {
            alert("Sin stock disponible");
            return;
        }
        const existing = carrito.find(item => item.id === productId);
        if(existing) {
            if(existing.cantidad + 1 > product.stock) {
                alert("No hay suficiente stock");
                return;
            }
            existing.cantidad++;
        } else {
            carrito.push({...product, cantidad: 1});
        }
        updateCartDisplay();
    }

    function removeFromCart(index) {
        carrito.splice(index, 1);
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const container = document.getElementById("cartItems");
        if(carrito.length === 0) {
            container.innerHTML = '<div style="color: #9ca3af; text-align: center;">No hay productos agregados</div>';
            document.getElementById("total").innerText = "0";
            return;
        }
        let total = 0;
        container.innerHTML = carrito.map((item, idx) => {
            const totalItem = item.precio * item.cantidad;
            total += totalItem;
            return `
                <div class="cart-item">
                    <div><strong>${item.nombre}</strong> x${item.cantidad}</div>
                    <div>$${totalItem.toFixed(2)} <button onclick="removeFromCart(${idx})" style="background:none;border:none;color:#ef4444;cursor:pointer;">❌</button></div>
                </div>
            `;
        }).join('');
        document.getElementById("total").innerText = total.toFixed(2);
    }

    document.getElementById("completeSaleBtn")?.addEventListener("click", () => {
        if(carrito.length === 0) {
            alert("Agrega productos al carrito");
            return;
        }
        const total = carrito.reduce((sum, item) => sum + (item.precio * item.cantidad), 0);
        for(let item of carrito) {
            const prod = productos.find(p => p.id === item.id);
            if(prod) prod.stock -= item.cantidad;
        }
        const venta = {
            id: Date.now(),
            fecha: new Date().toLocaleString(),
            productos: carrito.map(i => ({nombre: i.nombre, cantidad: i.cantidad, precio: i.precio})),
            total: total,
            metodoPago: selectedPayment
        };
        ventasHistorial.unshift(venta);
        saveData();
        carrito = [];
        updateCartDisplay();
        renderProducts();
        renderInventoryList();
        alert(`✅ Venta completada por $${total.toFixed(2)} - Pago: ${selectedPayment}`);
    });

    document.querySelectorAll(".payment-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".payment-btn").forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
            selectedPayment = btn.getAttribute("data-payment");
        });
    });
    document.querySelector(".payment-btn[data-payment='efectivo']")?.classList.add("selected");

    const searchInput = document.getElementById("searchProduct");
    if(searchInput) searchInput.addEventListener("input", (e) => renderProducts(e.target.value));

    const menuToggleBtn = document.getElementById("menuToggleBtn");
    const floatingMenu = document.getElementById("floatingMenu");
    
    function toggleMenu() { floatingMenu.classList.toggle("open"); }
    function closeMenu() { floatingMenu.classList.remove("open"); }
    
    menuToggleBtn?.addEventListener("click", (e) => { e.stopPropagation(); toggleMenu(); });
    document.addEventListener("click", (e) => {
        if (floatingMenu && !floatingMenu.contains(e.target) && e.target !== menuToggleBtn) closeMenu();
    });
    
    function initNavigation() {
        const menuItems = document.querySelectorAll(".menu-item");
        const sections = document.querySelectorAll(".section");
        
        menuItems.forEach(item => {
            item.addEventListener("click", () => {
                const sectionId = item.getAttribute("data-section");
                sections.forEach(sec => sec.classList.remove("active-section"));
                document.getElementById(sectionId).classList.add("active-section");
                menuItems.forEach(nav => nav.classList.remove("active"));
                item.classList.add("active");
                closeMenu();
                
                if(sectionId === "inventario") renderInventoryList();
                if(sectionId === "historial") renderHistory();
            });
        });
    }

    function renderInventoryList() {
        const container = document.getElementById("inventoryList");
        if(!container) return;
        
        if(productos.length === 0) {
            container.innerHTML = "<div>No hay productos. Agrega uno usando el formulario.</div>";
            return;
        }
        
        container.innerHTML = productos.map(p => `
            <div class="product-row">
                <div><strong>${p.nombre}</strong> - $${p.precio} - Stock: ${p.stock}</div>
                <div class="product-actions">
                    <button onclick="editProduct(${p.id})">✏️ Editar</button>
                    <button onclick="deleteProduct(${p.id})" style="background:#ef4444; color:white;">❌ Eliminar</button>
                </div>
            </div>
        `).join('');
    }

    function addProduct() {
        const name = document.getElementById("newProductName")?.value;
        const price = parseFloat(document.getElementById("newProductPrice")?.value);
        const stock = parseInt(document.getElementById("newProductStock")?.value);
        
        if(!name || isNaN(price) || isNaN(stock)) {
            alert("Completa todos los campos correctamente");
            return;
        }
        
        const newId = productos.length > 0 ? Math.max(...productos.map(p => p.id)) + 1 : 1;
        productos.push({id: newId, nombre: name, precio: price, stock: stock});
        saveData();
        renderInventoryList();
        renderProducts();
        
        document.getElementById("newProductName").value = "";
        document.getElementById("newProductPrice").value = "";
        document.getElementById("newProductStock").value = "";
        alert(`✅ Producto "${name}" agregado correctamente`);
    }
    
    function editProduct(id) {
        const product = productos.find(p => p.id === id);
        if(!product) return;
        
        const newName = prompt("Nuevo nombre:", product.nombre);
        if(newName && newName.trim()) product.nombre = newName.trim();
        
        const newPrice = prompt("Nuevo precio:", product.precio);
        if(newPrice && !isNaN(parseFloat(newPrice))) product.precio = parseFloat(newPrice);
        
        const newStock = prompt("Nuevo stock:", product.stock);
        if(newStock && !isNaN(parseInt(newStock))) product.stock = parseInt(newStock);
        
        saveData();
        renderInventoryList();
        renderProducts();
        alert("✅ Producto actualizado");
    }
    
    function deleteProduct(id) {
        if(confirm("¿Eliminar este producto permanentemente?")) {
            productos = productos.filter(p => p.id !== id);
            saveData();
            renderInventoryList();
            renderProducts();
            alert("✅ Producto eliminado");
        }
    }
    
    function renderHistory() {
        const container = document.getElementById("historyList");
        if(!container) return;
        
        if(ventasHistorial.length === 0) {
            container.innerHTML = "<div>No hay ventas registradas</div>";
            return;
        }
        
        container.innerHTML = ventasHistorial.map(v => `
            <div style="border:1px solid #ddd; margin:8px; padding:8px; border-radius:8px;">
                <strong>ID:</strong> ${v.id}<br>
                <strong>Fecha:</strong> ${v.fecha}<br>
                <strong>Total:</strong> $${v.total.toFixed(2)}<br>
                <strong>Pago:</strong> ${v.metodoPago}<br>
                <strong>Productos:</strong> ${v.productos.map(p => `${p.nombre} x${p.cantidad}`).join(", ")}
            </div>
        `).join('');
    }

    loadData();
    initNavigation();
    renderProducts();
    updateCartDisplay();
    renderInventoryList();
    renderHistory();
    
    document.getElementById("addProductBtn")?.addEventListener("click", addProduct);
</script>
</body>
</html>
